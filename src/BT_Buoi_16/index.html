<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTVN - Buổi 16</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/output.css" />
  </head>
  <body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto max-w-4xl px-4 py-10">
      <header>
        <h1 class="text-center text-blue-500 text-4xl mb-10 font-bold">
          Xử Lý Mảng Số Nguyên
        </h1>
      </header>
      <!-- Import mảng số nguyên -->
      <section class="flex flex-col gap-5 bg-white rounded-lg px-8 py-5 mb-5">
        <div
          class="flex flex-col md:flex-row gap-5 justify-between items-center"
        >
          <label for="inputArr" class="text-black font-semibold text-lg italic"
            >Mời bạn nhập mảng số nguyên</label
          >
          <input
            id="inputArr"
            type="text"
            placeholder="Nhập mảng, ví dụ: 1,2,3,4,..."
            class="w-60 h-10 px-2 py-4 rounded-lg border border-transparent focus:border-blue-500 outline-none"
          />
          <button
            id="btnAddArr"
            class="cursor-pointer w-50 h-10 rounded-lg bg-blue-500 text-white font-semibold"
          >
            Thêm mảng
          </button>
        </div>
        <div
          id="arrDisplay"
          class="text-purple-500 bg-blue-100 flex rounded-lg justify-center px-2 py-4"
        ></div>
      </section>
      <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Function List -->
        <div id="functionList" class="space-y-4"></div>
        <!-- Result -->
        <div>
          <div class="space-y-4 bg-white p-4">
            <h3 class="text-black text-xl font-bold">
              <i class="fa-regular fa-hand-point-right"></i> Kết quả!
            </h3>
            <div
              id="resultOutput"
              class="w-full border border-dashed text-gray-400 italic border-gray-300 bg-gray-50 rounded-xl p-4"
            >
              Chưa có yêu cầu nào được thực hiện!
            </div>
            <button
              class="cursor-pointer w-full hover:text-red-500"
              onclick="reset()"
            >
              <i class="fas fa-trash-alt mr-1"></i> Làm mới mảng
            </button>
          </div>
        </div>
      </section>
      <div
        id="customModal"
        class="hidden fixed inset-0 bg-gray-100 bg-opacity-50 z-50 flex items-center justify-center p-4 transition-opacity"
      >
        <div
          class="glass-card w-full max-w-md rounded-2xl shadow-2xl p-6 transform transition-all scale-95"
        >
          <h3 id="modalTitle" class="text-2xl font-bold text-blue-500 mb-4">
            Tiêu đề
          </h3>
          <p id="modalDescription" class="text-gray-500 mb-6 text-sm">
            Mô tả hướng dẫn
          </p>

          <div id="modalInputs" class="space-y-4"></div>

          <div class="flex gap-3 mt-8">
            <button
              onclick="closeModal()"
              class="cursor-pointer flex-1 py-3 border border-gray-200 rounded-xl hover:bg-blue-500 hover:text-white font-medium transition-colors"
            >
              Hủy bỏ
            </button>
            <button
              id="modalConfirmBtn"
              class="cursor-pointer flex-1 py-3 border border-gray-200 rounded-xl hover:bg-blue-500 hover:text-white font-medium transition-colors"
            >
              Xác nhận
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
